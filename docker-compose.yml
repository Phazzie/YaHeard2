version: '3.8'

services:
  yaheard2:
    build: .
    ports:
      - "3000:3000"
    environment:
      - NODE_ENV=production
      - PORT=3000
      - BODY_SIZE_LIMIT=100mb
    env_file:
      - .env
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
    volumes:
      - ./logs:/app/logs
    labels:
      - "com.yaheard2.service=web"
      - "com.yaheard2.version=1.0.0"

